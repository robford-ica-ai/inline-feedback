<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline Feedback</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="popup-container">
        <header class="popup-header">
            <div class="logo">
                <h1>Inline Feedback</h1>
                <span class="version">v1.0.0</span>
            </div>
        </header>

        <main class="popup-content">
            <div class="status-section">
                <div class="status-indicator">
                    <span class="status-dot" id="statusDot"></span>
                    <span class="status-text" id="statusText">Initializing...</span>
                </div>
            </div>

            <div class="quick-actions">
                <h3>Quick Actions</h3>
                <button id="translateBtn" class="action-btn" title="Translate selected text">
                    <span class="btn-icon">🌐</span>
                    <span class="btn-text">Translate</span>
                </button>
                <button id="explainBtn" class="action-btn" title="Explain selected concept">
                    <span class="btn-icon">💡</span>
                    <span class="btn-text">Explain</span>
                </button>
                <button id="highlightBtn" class="action-btn" title="Toggle medical term highlighting">
                    <span class="btn-icon">🎯</span>
                    <span class="btn-text">Highlight</span>
                </button>
            </div>

            <div class="settings-section">
                <h3>Settings</h3>
                <div class="setting-item">
                    <label for="autoHighlight">
                        <input type="checkbox" id="autoHighlight" checked>
                        Auto-highlight medical terms
                    </label>
                </div>
                <div class="setting-item">
                    <label for="showTooltips">
                        <input type="checkbox" id="showTooltips" checked>
                        Show tooltips on hover
                    </label>
                </div>
                <div class="setting-item">
                    <label for="autoTranslate">
                        <input type="checkbox" id="autoTranslate">
                        Auto-translate on hover
                    </label>
                </div>
            </div>

            <div class="api-section">
                <h3>AI Configuration</h3>
                <div class="setting-item">
                    <label for="apiKey">Claude API Key:</label>
                    <input type="password" id="apiKey" placeholder="sk-ant-..." class="api-input">
                    <button id="testApiBtn" class="test-btn">Test</button>
                </div>
                <div class="setting-item">
                    <label for="modelSelect">Model:</label>
                    <select id="modelSelect" class="model-select">
                        <option value="claude-3-sonnet-20240229">Claude 3 Sonnet</option>
                        <option value="claude-3-haiku-20240307">Claude 3 Haiku</option>
                        <option value="claude-3-opus-20240229">Claude 3 Opus</option>
                    </select>
                </div>
            </div>

            <div class="info-section">
                <h3>Statistics</h3>
                <div class="stats">
                    <div class="stat-item">
                        <span class="stat-label">Translations:</span>
                        <span class="stat-value" id="translationCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Explanations:</span>
                        <span class="stat-value" id="explanationCount">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Medical terms found:</span>
                        <span class="stat-value" id="termCount">0</span>
                    </div>
                </div>
            </div>
        </main>

        <footer class="popup-footer">
            <div class="shortcuts">
                <small>
                    <strong>Shortcuts:</strong> 
                    Cmd+Shift+T (Translate) • Cmd+Shift+E (Explain)
                </small>
            </div>
            <div class="links">
                <a href="#" id="helpLink">Help</a> •
                <a href="#" id="historyLink">History</a> •
                <a href="#" id="aboutLink">About</a>
            </div>
        </footer>
    </div>

    <script src="popup.js"></script>
</body>
</html>
